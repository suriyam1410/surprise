<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Marry Me?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ff69b4, #ffb6d9, #ffc0cb, #ffb6d9);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        .question {
            font-size: 48px;
            color: #ff1493;
            margin-bottom: 50px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .buttons {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            font-size: 24px;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #yesBtn {
            background-color: #ff1493;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        #noBtn {
            background-color: #fff;
            color: #ff1493;
            border: 2px solid #ff1493;
        }

        #noBtn:hover {
            transform: translate(50px, 50px);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .question {
                font-size: 32px;
                margin-bottom: 30px;
            }

            .buttons {
                flex-direction: column;
                gap: 20px;
                align-items: center;
            }

            button {
                font-size: 18px;
                padding: 12px 30px;
                min-width: 150px;
            }

            .slideshow {
                font-size: 36px;
            }
        }

        @media (max-width: 480px) {
            .question {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .buttons {
                gap: 15px;
            }

            button {
                font-size: 16px;
                padding: 10px 25px;
                min-width: 120px;
            }

            .slideshow {
                font-size: 28px;
            }
        }

        .slideshow {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff69b4, #ffb6d9);
            justify-content: center;
            align-items: center;
            font-size: 60px;
            color: white;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            padding: 20px;
        }

        .slideshow.active {
            display: flex;
        }

        .slides {
            animation: fadeInOut 3s infinite;
        }

        @keyframes fadeInOut {
            0%, 10% { opacity: 1; }
            25%, 35% { opacity: 0; }
            50%, 60% { opacity: 1; }
            75%, 85% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="question">Will you marry me?</p>
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div class="slideshow" id="slideshow">
        <div class="slides">
            <div>Yehhhhh!</div>
            <div>I knew it!</div>
            <div>You do!</div>
            <div>I Love You 💕</div>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const slideshow = document.getElementById('slideshow');

        yesBtn.addEventListener('click', function() {
            slideshow.classList.add('active');
        });

        // Move button on hover (desktop)
        noBtn.addEventListener('mouseover', function() {
            moveButton();
        });

        // Move button on click (mobile)
        noBtn.addEventListener('click', function(e) {
            e.preventDefault();
            moveButton();
        });

        // Move button on touch (mobile backup)
        noBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            moveButton();
        });

        function moveButton() {
            const randomX = Math.random() * 200 - 100;
            const randomY = Math.random() * 200 - 100;
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }
    </script>
</body>
</html>
